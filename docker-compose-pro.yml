services:
  redis:
    image: redis:7.4
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    ports:
      - 6379

  mongo:
    image: mongo:7.0-jammy
    container_name: ${PROJECT_NAME}-mongo
    restart: unless-stopped
    env_file:
      - .env.mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - qhld-mongo:/data/db

  qhld-engine:
    image: politicalwatch/qhld-engine:${BRANCH}
    container_name: ${PROJECT_NAME}-engine
    restart: unless-stopped
    env_file:
      - .env.mongo
      - .env.engine
    ports:
      - 8091:8091
    depends_on:
      - mongo

  qhld-backend:
    image: politicalwatch/qhld-backend:${BRANCH}
    container_name: ${PROJECT_NAME}-backend
    restart: unless-stopped
    env_file:
      - .env.mongo
      - .env.backend
    # command: if you want to add different command
    ports:
      - ${BACKEND_PORT}:5000
    depends_on:
      - mongo

  qhld-tasks:
    image: politicalwatch/qhld-tasks:${BRANCH}
    container_name: ${PROJECT_NAME}-tasks
    restart: unless-stopped
    env_file:
      - .env.mongo
      - .env.tasks
    depends_on:
      - redis
      - mongo

volumes:
  qhld-mongo:
